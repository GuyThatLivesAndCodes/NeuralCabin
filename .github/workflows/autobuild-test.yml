name: Build & Test

on:
  push:
    branches: [master, "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.os }} / Rust stable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: neuralcabin
            asset_name: neuralcabin-linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: neuralcabin.exe
            asset_name: neuralcabin-windows-x86_64
            archive_ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: neuralcabin
            asset_name: neuralcabin-macos-aarch64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # ── Frontend build (must happen before Rust so it can be embedded) ─────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Rust build (embeds frontend/dist via rust-embed) ──────────────────
      - name: Build (release)
        run: cargo build --package neuralcabin-backend --release

      - name: Test engine
        run: cargo test --package neuralcabin-engine --no-fail-fast

      - name: Clippy
        run: cargo clippy --package neuralcabin-engine --package neuralcabin-backend -- -D warnings

      - name: Headless XOR demo
        run: cargo run --package neuralcabin-backend --release -- --xor-demo
        # Note: the binary prints help and exits unless passed --xor-demo
        # We delegate headless testing to the engine test suite above;
        # this step just confirms the binary starts and handles the flag.
        continue-on-error: true

      # ── Package artifact ───────────────────────────────────────────────────
      - name: Stage release artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.asset_name }}
          cp target/release/${{ matrix.artifact_name }} staging/${{ matrix.asset_name }}/
          cp README.md LICENSE.md staging/${{ matrix.asset_name }}/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C staging ${{ matrix.asset_name }}
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Stage release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging\${{ matrix.asset_name }} | Out-Null
          Copy-Item target\release\${{ matrix.artifact_name }} staging\${{ matrix.asset_name }}\
          Copy-Item README.md, LICENSE.md staging\${{ matrix.asset_name }}\
          Compress-Archive -Path staging\${{ matrix.asset_name }}\* -DestinationPath ${{ matrix.asset_name }}.zip -Force
          (Get-FileHash ${{ matrix.asset_name }}.zip -Algorithm SHA256).Hash | Out-File -Encoding ASCII ${{ matrix.asset_name }}.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
            ${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
            ${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
