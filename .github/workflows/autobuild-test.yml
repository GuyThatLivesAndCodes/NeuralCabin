name: Build & Test

on:
  push:
    branches: [master, "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  # ── Engine unit tests (fast, Linux only) ────────────────────────────────
  engine-tests:
    name: Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --package neuralcabin-engine --no-fail-fast
      - run: cargo clippy --package neuralcabin-engine -- -D warnings

  # ── Tauri app build (all three platforms) ───────────────────────────────
  build-app:
    name: Build app (${{ matrix.os }})
    needs: engine-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Linux needs WebKit headers to compile Tauri
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          npm install
          npm --prefix frontend install

      - name: Generate Tauri icons
        run: npx tauri icon assets/icon.png

      # Run the Tauri-crate unit tests (persistence roundtrip, etc.). Skipped
      # on platforms where the engine-tests job already covers the same code
      # path is NOT what we want — these tests live in the neuralcabin crate
      # and depend on tauri's runtime, so they only compile after the system
      # dependencies above are installed.
      - name: Test Tauri crate
        run: cargo test --package neuralcabin --lib --no-fail-fast

      - name: Build frontend
        run: npm --prefix frontend run build

      # Build the Tauri app via the Tauri CLI so the frontend assets are
      # bundled into the binary. Plain `cargo build` produces a binary that
      # falls back to devUrl (localhost) at runtime — broken for end users.
      - name: Build Tauri app
        run: npm run tauri -- build --no-bundle

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: neuralcabin-linux-x86_64
          path: target/release/neuralcabin
          retention-days: 30

      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: neuralcabin-macos
          path: target/release/neuralcabin
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: neuralcabin-windows-x86_64
          path: target/release/neuralcabin.exe
          retention-days: 30

  # ── Release bundles (installers) — only on version tags ─────────────────
  release-bundles:
    name: Release bundle (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          npm install
          npm --prefix frontend install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NeuralCabin ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          iconPath: 'assets/icon.png'
