name: Autobuild Test App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Cache electron-builder binaries
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\electron-builder\cache
        key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-builder-

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build Application (No Publish)
      run: npm run build:nobump
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NeuralCabin-Build
        path: dist/NeuralCabin-Setup-*.exe
        retention-days: 30
